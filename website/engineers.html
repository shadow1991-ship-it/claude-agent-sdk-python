<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دليل المهندسين — The Eye of the Smart Monkey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <style>
    :root {
      --bg:     #03050a;
      --panel:  #080d14;
      --border: #0f2040;
      --accent: #00c3ff;
      --accent2:#7b2fff;
      --green:  #00ff88;
      --red:    #ff3b5c;
      --text:   #c8d8f0;
      --muted:  #4a6080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .8rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(8,13,20,.9);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
    }
    nav .logo { font-family:'Fira Code',monospace; font-size:.9rem; color:var(--accent); }
    nav .logo span { color:var(--green); }
    nav .links { display:flex; gap:1.5rem; }
    nav .links a { color:var(--muted); text-decoration:none; font-size:.85rem; transition:color .2s; }
    nav .links a:hover { color:var(--accent); }

    .shell { max-width:1100px; margin:0 auto; padding:2rem 1.5rem; }

    /* Header */
    .page-header { text-align:center; padding:3rem 0 2.5rem; }
    .page-header h1 { font-size:2rem; color:#fff; margin-bottom:.75rem; }
    .page-header h1 span {
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .page-header p { color:var(--muted); font-size:.95rem; }

    /* Search box */
    .search-wrap {
      position: relative;
      max-width: 600px;
      margin: 0 auto 2rem;
    }
    .search-icon {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1.1rem;
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: .9rem 3rem .9rem 1rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      direction: rtl;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    /* Filters */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .filter-btn {
      padding: .35rem .9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: .8rem;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,195,255,.05);
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 1.5rem;
      padding: .75rem 1.2rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 2rem;
      font-family: 'Fira Code', monospace;
      font-size: .78rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .stats-bar span { color: var(--accent); }

    /* Grid */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.2rem;
    }

    /* Card */
    .eng-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem;
      transition: border-color .2s, transform .2s;
      cursor: default;
    }
    .eng-card:hover { border-color: var(--accent); transform: translateY(-3px); }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .avatar {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      color: #fff;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 700;
      color: #fff;
      font-size: .95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-title { color: var(--muted); font-size: .8rem; margin-top: .2rem; }

    .avail-badge {
      padding: .2rem .6rem;
      border-radius: 999px;
      font-size: .7rem;
      font-family: 'Fira Code', monospace;
      flex-shrink: 0;
    }
    .avail-yes { background: rgba(0,255,136,.1); color: var(--green); border: 1px solid rgba(0,255,136,.2); }
    .avail-no  { background: rgba(255,59,92,.1);  color: var(--red);   border: 1px solid rgba(255,59,92,.2); }

    .card-bio {
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: .9rem;
    }

    .card-skills {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-bottom: 1rem;
    }
    .skill-tag {
      padding: .18rem .55rem;
      background: rgba(0,195,255,.07);
      border: 1px solid rgba(0,195,255,.15);
      border-radius: 4px;
      font-family: 'Fira Code', monospace;
      font-size: .68rem;
      color: var(--accent);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: .8rem;
      border-top: 1px solid var(--border);
      font-size: .78rem;
    }
    .card-location { color: var(--muted); }
    .card-github {
      display: inline-flex; align-items: center; gap: .3rem;
      color: var(--accent);
      text-decoration: none;
      font-size: .78rem;
    }
    .card-github:hover { text-decoration: underline; }

    .level-badge {
      padding: .15rem .5rem;
      border-radius: 4px;
      font-size: .68rem;
      font-family: 'Fira Code', monospace;
    }
    .level-Senior { background:rgba(123,47,255,.15); color:var(--accent2); }
    .level-Mid    { background:rgba(0,195,255,.1);   color:var(--accent); }
    .level-Junior { background:rgba(0,255,136,.1);   color:var(--green); }

    /* Empty state */
    #empty {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    #empty .icon { font-size: 3rem; margin-bottom: 1rem; }
    #empty p { font-size: .9rem; }

    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-family: 'Fira Code', monospace;
      font-size: .75rem;
      color: var(--muted);
      margin-top: 3rem;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

<nav>
  <div class="logo">&gt; <span>sentinel</span>://engineers</div>
  <div class="links">
    <a href="index.html">الرئيسية</a>
    <a href="https://github.com/shadow1991-ship-it" target="_blank">GitHub</a>
  </div>
</nav>

<div class="shell">

  <div class="page-header">
    <h1>🔍 دليل <span>المهندسين</span></h1>
    <p>ابحث عن مهندسين بالاسم، المهارة، أو الموقع — فوري، بلا سيرفر</p>
  </div>

  <div class="search-wrap">
    <div class="search-icon">🔍</div>
    <input id="search" type="text" placeholder="ابحث بالاسم، المهارة، أو الموقع..." />
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">الكل</button>
    <button class="filter-btn" data-filter="available">متاح الآن</button>
    <button class="filter-btn" data-filter="Senior">Senior</button>
    <button class="filter-btn" data-filter="Mid">Mid</button>
    <button class="filter-btn" data-filter="security">أمن</button>
    <button class="filter-btn" data-filter="ai">AI / ML</button>
    <button class="filter-btn" data-filter="backend">Backend</button>
    <button class="filter-btn" data-filter="devops">DevOps</button>
  </div>

  <div class="stats-bar">
    <div>المهندسون: <span id="count-total">0</span></div>
    <div>متاح: <span id="count-available">0</span></div>
    <div>نتائج البحث: <span id="count-results">0</span></div>
  </div>

  <div id="grid"></div>
  <div id="empty">
    <div class="icon">🤖</div>
    <p>لا توجد نتائج — جرّب بحثاً مختلفاً</p>
  </div>

</div>

<footer>
  <span><a href="index.html">← الرئيسية</a> · <a href="https://github.com/shadow1991-ship-it">GitHub</a></span>
  <span>بحث مدعوم بـ Fuse.js — يعمل offline كاملاً</span>
</footer>

<script>
const AVATARS = ['🐒','🦊','🐺','🦁','🐻','🦄','🐉','🤖'];
let allData = [], fuse, activeFilter = 'all', currentQuery = '';

async function load() {
  const r = await fetch('data/engineers.json');
  allData = await r.json();

  fuse = new Fuse(allData, {
    keys: ['name', 'title', 'skills', 'location', 'bio', 'projects'],
    threshold: 0.35,
    includeScore: true,
  });

  document.getElementById('count-total').textContent = allData.length;
  document.getElementById('count-available').textContent = allData.filter(e => e.available).length;

  render(allData);
}

function applyFilter(data) {
  if (activeFilter === 'all')       return data;
  if (activeFilter === 'available') return data.filter(e => e.available);
  if (activeFilter === 'Senior' || activeFilter === 'Mid' || activeFilter === 'Junior')
                                    return data.filter(e => e.level === activeFilter);
  if (activeFilter === 'security')  return data.filter(e => e.skills.some(s => /security|sast|dast|pentest|vuln|scan/i.test(s)));
  if (activeFilter === 'ai')        return data.filter(e => e.skills.some(s => /ai|ml|llm|torch|transformer|ollama/i.test(s)));
  if (activeFilter === 'backend')   return data.filter(e => /backend|api|server/i.test(e.title));
  if (activeFilter === 'devops')    return data.filter(e => /devops|platform|infra/i.test(e.title));
  return data;
}

function render(data) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  const filtered = applyFilter(data);
  document.getElementById('count-results').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map((e, i) => `
    <div class="eng-card">
      <div class="card-top">
        <div class="avatar">${AVATARS[e.id % AVATARS.length]}</div>
        <div class="card-info">
          <div class="card-name">${e.name}</div>
          <div class="card-title">${e.title}</div>
        </div>
        <span class="avail-badge ${e.available ? 'avail-yes' : 'avail-no'}">
          ${e.available ? '● متاح' : '● مشغول'}
        </span>
      </div>
      <p class="card-bio">${e.bio}</p>
      <div class="card-skills">
        ${e.skills.slice(0,6).map(s => `<span class="skill-tag">${s}</span>`).join('')}
      </div>
      <div class="card-footer">
        <div>
          <span class="card-location">📍 ${e.location}</span>
          &nbsp;&nbsp;
          <span class="level-badge level-${e.level}">${e.level}</span>
        </div>
        ${e.github !== '#'
          ? `<a class="card-github" href="${e.github}" target="_blank">GitHub ↗</a>`
          : `<span style="color:var(--muted);font-size:.75rem">خاص</span>`
        }
      </div>
    </div>
  `).join('');
}

function search(q) {
  if (!q.trim()) return allData;
  return fuse.search(q).map(r => r.item);
}

document.getElementById('search').addEventListener('input', e => {
  currentQuery = e.target.value;
  render(search(currentQuery));
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render(search(currentQuery));
  });
});

load();
</script>
</body>
</html>
