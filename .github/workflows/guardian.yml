name: 👑 AL_HAKIM Guardian — حارس الإمبراطورية

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 0 * * *"  # يومياً منتصف الليل UTC
  workflow_dispatch:      # تشغيل يدوي

jobs:
  guardian:
    name: 🏰 فحص سلامة الإمبراطورية
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: 📥 جلب الكود
        uses: actions/checkout@v4

      - name: 🐍 إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔐 فحص وجود MANIFEST.sig
        id: check_manifest
        run: |
          if [ -f "MANIFEST.sig" ]; then
            echo "manifest_exists=true" >> $GITHUB_OUTPUT
            echo "✅ MANIFEST.sig موجود"
          else
            echo "manifest_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ MANIFEST.sig غير موجود — سيتم إنشاؤه"
          fi

      - name: 📋 إنشاء MANIFEST.sig إذا لم يكن موجوداً
        if: steps.check_manifest.outputs.manifest_exists == 'false'
        run: |
          python guardian.py --manifest
          echo "✅ MANIFEST.sig تم إنشاؤه"

      - name: 🛡️ التحقق من سلامة الملفات
        id: integrity
        run: |
          python guardian.py --verify-all 2>&1 | tee verify_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 📊 تقرير الحالة
        run: |
          echo "══════════════════════════════════════"
          echo "  👑 AL_HAKIM GUARDIAN — تقرير الحالة"
          echo "══════════════════════════════════════"
          echo "  📅 التاريخ: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "  🌿 الفرع: ${{ github.ref_name }}"
          echo "  👤 المُشغّل: ${{ github.actor }}"
          echo "  📝 آخر commit: ${{ github.sha }}"
          echo "══════════════════════════════════════"
          cat verify_output.txt

      - name: 🚨 فتح Issue عند اكتشاف تلاعب
        if: steps.integrity.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('verify_output.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 تنبيه أمني — AL_HAKIM Guardian — ${new Date().toISOString().slice(0,10)}`,
              body: `## ⚠️ تم اكتشاف تغيير غير مصرح به

**الإمبراطورية تحت المراقبة — تم رصد تغيير**

| المعلومة | القيمة |
|----------|--------|
| 📅 التاريخ | ${new Date().toISOString()} |
| 🌿 الفرع | \`${{ github.ref_name }}\` |
| 👤 المُشغّل | \`${{ github.actor }}\` |
| 📝 Commit | \`${{ github.sha }}\` |

### تفاصيل الفحص:
\`\`\`
${output}
\`\`\`

### الإجراء المطلوب:
1. راجع التغييرات المكتشفة
2. إذا كانت مصرحاً بها: شغّل \`python guardian.py --manifest\` لتحديث MANIFEST.sig
3. إذا كانت غير مصرحة: أغلق الباب فوراً

---
*👑 AL_HAKIM GUARDIAN — الحكيم يراقب دائماً*`,
              labels: ['security', 'guardian-alert'],
            });

      - name: ✅ الإمبراطورية سليمة
        if: steps.integrity.outputs.exit_code == '0'
        run: |
          echo "🏰 الإمبراطورية سليمة — AL_HAKIM يرعاها"
          echo "✅ جميع الملفات في حالتها الأصلية"
